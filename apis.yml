aid: database-schema-design
name: Database Schema Design
description: >-
  Database Schema Design is the practice of defining the tables, columns,
  data types, constraints, indexes, and relationships that make up a
  database. It applies to relational, document, key-value, columnar, and
  graph stores, and is supported by ER tooling, schema-as-code formats
  like DBML and Prisma, migration tools like Liquibase and Flyway, and
  emerging schema registries for streaming and document data.
